<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>理化大冒險地圖</title>
  <style>
    :root {
      --bg: #050914;
      --panel: rgba(10, 18, 34, 0.86);
      --text: #f7fbff;
      --muted: #aeb9d1;
      --gold: #ffd25a;
      --green: #45d979;
      --red: #ff5268;
      --blue: #66d9ff;
      --line: rgba(255,255,255,0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 12%, rgba(102, 217, 255, 0.18), transparent 24rem),
        radial-gradient(circle at 82% 20%, rgba(255, 210, 90, 0.16), transparent 24rem),
        linear-gradient(135deg, #040711, #0b1020 55%, #03050b);
      overflow: hidden;
    }

    button { font: inherit; }

    .cover {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 50;
      background: #02050c;
      cursor: pointer;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    .cover.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cover-tip {
      position: fixed;
      left: 50%;
      bottom: 5vh;
      transform: translateX(-50%);
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: var(--text);
      font-weight: 900;
      text-shadow: 0 0 12px rgba(102,217,255,0.9);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.48; }
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 16px;
      gap: 12px;
    }

    header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0,0,0,0.34);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.8rem);
      letter-spacing: 0;
    }

    .lead {
      margin: 4px 0 0;
      color: var(--muted);
      font-weight: 800;
    }

    .hud {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .count {
      padding: 10px 14px;
      border: 1px solid rgba(255, 210, 90, 0.42);
      border-radius: 14px;
      color: var(--gold);
      background: rgba(255, 210, 90, 0.1);
      font-weight: 900;
      white-space: nowrap;
    }

    .reset {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      font-weight: 900;
      white-space: nowrap;
    }

    .map-stage {
      min-height: 0;
      display: grid;
      place-items: center;
      border: 1px solid rgba(102, 217, 255, 0.2);
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .map-wrap {
      position: relative;
      width: min(100%, calc((100vh - 126px) * 1672 / 941));
      max-width: 100%;
      aspect-ratio: 1672 / 941;
    }

    .map-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 18px;
      cursor: pointer;
      background: rgba(102, 217, 255, 0);
      transition: background 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      outline: none;
      border-color: rgba(102, 217, 255, 0.45);
      background: rgba(102, 217, 255, 0.11);
      box-shadow: 0 0 30px rgba(102, 217, 255, 0.36);
    }

    .hot-dynasty { left: 11.5%; top: 32.3%; width: 14.6%; height: 7.6%; }
    .hot-idiom { left: 76.1%; top: 37.0%; width: 15.2%; height: 7.8%; }
    .hot-warrior { left: 7.6%; top: 82.0%; width: 17.4%; height: 8.2%; }
    .hot-gate { left: 39.8%; top: 61.5%; width: 22.2%; height: 13.3%; }

    .stamp {
      position: absolute;
      width: clamp(30px, 4vw, 58px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 3px solid rgba(69, 217, 121, 0.9);
      border-radius: 50%;
      color: var(--green);
      background: rgba(3, 18, 10, 0.78);
      font-size: clamp(1.2rem, 2.6vw, 2rem);
      font-weight: 900;
      box-shadow: 0 0 22px rgba(69, 217, 121, 0.6);
      pointer-events: none;
    }

    .stamp-dynasty { left: 24.4%; top: 31.1%; }
    .stamp-idiom { left: 90.0%; top: 35.7%; }
    .stamp-warrior { left: 22.8%; top: 80.4%; }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0,0,0,0.66);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .modal.show { display: grid; }

    .door {
      width: min(960px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding: 22px;
      border: 1px solid rgba(255, 210, 90, 0.36);
      border-radius: 22px;
      background: linear-gradient(160deg, #27304a, #121827);
      box-shadow: 0 26px 80px rgba(0,0,0,0.58);
    }

    .door-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .door h2,
    .win h2 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
    }

    .close {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      font-weight: 900;
    }

    .slots,
    .bag {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .slot {
      min-height: 150px;
      display: grid;
      place-items: center;
      padding: 14px;
      border: 2px dashed rgba(255, 210, 90, 0.42);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(0,0,0,0.18);
      text-align: center;
      font-weight: 900;
    }

    .slot.over { box-shadow: 0 0 24px rgba(102, 217, 255, 0.25); }
    .slot.correct {
      border-style: solid;
      border-color: var(--green);
      background: rgba(69, 217, 121, 0.16);
    }
    .slot.wrong { animation: wrong 0.28s ease; }

    @keyframes wrong {
      25% { transform: translateX(-7px); box-shadow: 0 0 24px rgba(255, 82, 104, 0.5); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-4px); }
    }

    .section-title {
      margin: 18px 0 10px;
      color: var(--gold);
      font-weight: 900;
    }

    .cert {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(255, 210, 90, 0.45);
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255, 210, 90, 0.18), rgba(255,255,255,0.08));
      cursor: grab;
      font-weight: 900;
      user-select: none;
      touch-action: none;
    }

    .cert.placed {
      border-color: var(--green);
      background: rgba(69, 217, 121, 0.24);
      cursor: default;
    }

    .cert.dragging {
      position: fixed;
      z-index: 40;
      width: 170px;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1.04);
    }

    .empty {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
    }

    .win {
      display: none;
      padding: 28px;
      text-align: center;
      border: 1px solid rgba(255, 210, 90, 0.4);
      border-radius: 20px;
      background: radial-gradient(circle at 50% 0%, rgba(255,210,90,0.26), transparent 16rem), rgba(20, 26, 42, 0.94);
    }

    .win.show { display: block; }
    .door-body.hide { display: none; }

    .ending {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 60;
      color: var(--text);
      background: #02050d;
      cursor: pointer;
      overflow: hidden;
    }

    .ending.show {
      display: block;
    }

    .ending-scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.65s ease;
      background:
        radial-gradient(circle at 50% 45%, rgba(102, 217, 255, 0.2), transparent 18rem),
        radial-gradient(circle at 70% 15%, rgba(255, 210, 90, 0.12), transparent 20rem),
        linear-gradient(135deg, #030713, #071426 58%, #02050c);
    }

    .ending-scene.active {
      opacity: 1;
    }

    .ending-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(102, 217, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102, 217, 255, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 45%, black, transparent 72%);
    }

    .scene-art {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .ending-image {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #02050d;
      transform: scale(1);
      filter: saturate(1.05) brightness(0.96);
    }

    .ending-scene.active .ending-image {
      animation: cinematicMove 4.8s linear forwards;
    }

    .ending-scene:nth-of-type(2).active .ending-image {
      animation-name: cinematicMoveRight;
    }

    .ending-scene:nth-of-type(3).active .ending-image {
      animation-name: cinematicMoveLeft;
    }

    .ending-scene:nth-of-type(4).active .ending-image {
      animation-name: cinematicMoveUp;
    }

    @keyframes cinematicMove {
      from { transform: scale(1); filter: saturate(1.02) brightness(0.95); }
      to { transform: scale(1.075); filter: saturate(1.18) brightness(1.05); }
    }

    @keyframes cinematicMoveRight {
      from { transform: scale(1.02) translateX(-1.2%); filter: saturate(1.05) brightness(0.96); }
      to { transform: scale(1.09) translateX(1.2%); filter: saturate(1.2) brightness(1.08); }
    }

    @keyframes cinematicMoveLeft {
      from { transform: scale(1.02) translateX(1.4%); filter: saturate(1.04) brightness(0.96); }
      to { transform: scale(1.085) translateX(-1.2%); filter: saturate(1.18) brightness(1.06); }
    }

    @keyframes cinematicMoveUp {
      from { transform: scale(1.01) translateY(1.2%); filter: saturate(1.03) brightness(0.95); }
      to { transform: scale(1.08) translateY(-1.2%); filter: saturate(1.16) brightness(1.07); }
    }

    .gate-arc {
      position: absolute;
      left: 50%;
      top: 24%;
      width: min(42vw, 520px);
      aspect-ratio: 1;
      transform: translateX(-50%);
      border: 14px solid rgba(102, 217, 255, 0.55);
      border-bottom-color: transparent;
      border-radius: 50% 50% 18% 18%;
      box-shadow: 0 0 34px rgba(102, 217, 255, 0.52), inset 0 0 42px rgba(102, 217, 255, 0.18);
    }

    .gate-core {
      position: absolute;
      left: 50%;
      top: 42%;
      width: min(18vw, 220px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 210, 90, 0.95), rgba(102, 217, 255, 0.32) 48%, transparent 70%);
      box-shadow: 0 0 58px rgba(255, 210, 90, 0.62);
    }

    .road {
      position: absolute;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(102, 217, 255, 0.9), transparent);
      box-shadow: 0 0 18px rgba(102, 217, 255, 0.8);
      transform-origin: center;
    }

    .road.r1 { left: 12%; top: 43%; width: 35%; transform: rotate(15deg); }
    .road.r2 { right: 12%; top: 43%; width: 35%; transform: rotate(-15deg); }
    .road.r3 { left: 31%; bottom: 25%; width: 38%; transform: rotate(0deg); }

    .seal-orb {
      position: absolute;
      width: clamp(64px, 8vw, 112px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 3px solid rgba(255, 210, 90, 0.72);
      border-radius: 50%;
      color: var(--gold);
      background: rgba(10, 18, 34, 0.82);
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      box-shadow: 0 0 30px rgba(255, 210, 90, 0.36);
      animation: float 2.4s ease-in-out infinite;
    }

    .seal-orb.s1 { left: 25%; top: 25%; }
    .seal-orb.s2 { right: 25%; top: 27%; animation-delay: 0.3s; }
    .seal-orb.s3 { left: 46%; bottom: 20%; animation-delay: 0.6s; }

    @keyframes float {
      50% { transform: translateY(-12px); }
    }

    .wizard {
      position: absolute;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      font-size: clamp(4rem, 9vw, 8rem);
      filter: drop-shadow(0 0 18px rgba(255, 210, 90, 0.32));
    }

    .star-door {
      position: absolute;
      left: 50%;
      top: 38%;
      width: min(22vw, 260px);
      height: min(42vh, 420px);
      transform: translate(-50%, -50%);
      border-radius: 50% 50% 10% 10%;
      background: radial-gradient(circle at 50% 30%, #fff7c8, rgba(255, 210, 90, 0.72) 35%, rgba(102, 217, 255, 0.22) 68%, transparent 72%);
      box-shadow: 0 0 90px rgba(255, 210, 90, 0.72);
    }

    .island {
      position: absolute;
      width: clamp(150px, 20vw, 280px);
      aspect-ratio: 1.75;
      border-radius: 55% 45% 46% 54%;
      background: linear-gradient(180deg, rgba(102, 217, 255, 0.2), rgba(20, 28, 48, 0.95));
      border: 1px solid rgba(102, 217, 255, 0.32);
      box-shadow: 0 0 34px rgba(102, 217, 255, 0.22);
    }

    .island::after {
      content: attr(data-icon);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(2.4rem, 5vw, 4rem);
    }

    .island.i1 { left: 11%; top: 25%; }
    .island.i2 { right: 11%; top: 26%; }
    .island.i3 { left: 39%; bottom: 24%; }

    .bridge {
      position: absolute;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(102,217,255,0), rgba(102,217,255,0.82), rgba(255,210,90,0.62), rgba(102,217,255,0));
      box-shadow: 0 0 18px rgba(102,217,255,0.72);
    }

    .bridge.b1 { left: 24%; top: 46%; width: 28%; transform: rotate(18deg); }
    .bridge.b2 { right: 24%; top: 46%; width: 28%; transform: rotate(-18deg); }

    .star-map {
      position: absolute;
      left: 50%;
      top: 38%;
      width: min(72vw, 860px);
      height: min(46vh, 440px);
      transform: translateX(-50%);
      border: 1px solid rgba(102,217,255,0.32);
      border-radius: 26px;
      background:
        radial-gradient(circle at 18% 35%, rgba(255,210,90,0.85) 0 4px, transparent 5px),
        radial-gradient(circle at 48% 22%, rgba(102,217,255,0.85) 0 4px, transparent 5px),
        radial-gradient(circle at 70% 58%, rgba(102,217,255,0.4) 0 5px, transparent 6px),
        radial-gradient(circle at 86% 30%, rgba(255,255,255,0.28) 0 3px, transparent 4px),
        rgba(5, 12, 26, 0.78);
      box-shadow: inset 0 0 42px rgba(102,217,255,0.18), 0 0 34px rgba(102,217,255,0.2);
    }

    .star-map::before {
      content: "";
      position: absolute;
      inset: 16%;
      border-top: 2px solid rgba(102,217,255,0.3);
      border-bottom: 2px solid rgba(255,210,90,0.22);
      transform: rotate(-8deg);
    }

    .ending-caption {
      position: absolute;
      left: 50%;
      bottom: 7vh;
      z-index: 3;
      width: min(860px, calc(100% - 34px));
      transform: translateX(-50%);
      padding: 20px 24px;
      border: 1px solid rgba(102, 217, 255, 0.3);
      border-radius: 20px;
      background: rgba(3, 7, 18, 0.72);
      box-shadow: 0 18px 50px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .ending-caption.playing {
      animation: captionIn 0.7s ease both;
    }

    .ending-caption::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 10px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--gold));
      box-shadow: 0 0 14px rgba(102, 217, 255, 0.5);
      transform-origin: left center;
      transform: scaleX(0);
    }

    .ending-caption.playing::after {
      animation: endingProgress 4.8s linear forwards;
    }

    .ending-caption h2 {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      letter-spacing: 0.08em;
    }

    .ending-caption p {
      margin: 0;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      font-weight: 800;
      color: #eaf7ff;
    }

    .ending-hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @keyframes captionIn {
      from { opacity: 0; transform: translate(-50%, 12px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    @keyframes endingProgress {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @media (max-width: 780px) {
      body { overflow: auto; }

      .app {
        min-height: 100vh;
        height: auto;
        padding: 10px;
        grid-template-rows: auto auto;
      }

      header {
        display: block;
      }

      .hud {
        justify-content: start;
        margin-top: 10px;
      }

      .map-wrap {
        width: 100%;
      }

      .slots,
      .bag {
        grid-template-columns: 1fr;
      }

      .gate-arc {
        width: 68vw;
      }

      .star-door {
        width: 38vw;
      }
    }
  </style>
</head>
<body>
  <div class="cover" id="cover" aria-label="遊戲開場封面">
    <img src="cover.png" alt="理化大冒險開場封面">
    <div class="cover-tip">點擊任意處開始</div>
  </div>

  <div class="app">
    <header>
      <div>
        <h1>理化大冒險地圖</h1>
        <p class="lead">完成 3 個關卡，拿到 3 個憑證解開大門</p>
      </div>
      <div class="hud">
        <div class="count">持有 <span id="certCount">0</span> / 3</div>
        <button class="reset" id="clearProgress" type="button">🔄 清除進度</button>
      </div>
    </header>

    <main class="map-stage">
      <div class="map-wrap" id="mapWrap">
        <img class="map-img" src="map-bg.png" alt="理化大冒險地圖">
        <a class="hotspot hot-dynasty" href="../示範1_朝代配對/index.html" aria-label="前往朝代配對站"></a>
        <a class="hotspot hot-idiom" href="../示範2_成語填字/index.html" aria-label="前往成語填字艙"></a>
        <a class="hotspot hot-warrior" href="../示範3_打怪RPG/index.html" aria-label="前往 RPG 戰鬥域"></a>
        <button class="hotspot hot-gate" id="openGate" type="button" aria-label="開啟中央權限之門"></button>
        <div class="stamp stamp-dynasty" data-stamp="dynasty">✓</div>
        <div class="stamp stamp-idiom" data-stamp="idiom">✓</div>
        <div class="stamp stamp-warrior" data-stamp="warrior">✓</div>
      </div>
    </main>
  </div>

  <div class="modal" id="modal">
    <section class="door" aria-label="通關大門">
      <div class="door-head">
        <h2>通關大門</h2>
        <button class="close" id="closeModal" type="button">×</button>
      </div>

      <div class="door-body" id="doorBody">
        <div class="slots" id="slots"></div>
        <div class="section-title">背包憑證</div>
        <div class="bag" id="certBag"></div>
      </div>

      <div class="win" id="win">
        <h2>🏆 冒險完成！</h2>
        <p>總冒險時長：<strong id="duration">00 分 00 秒</strong></p>
        <button class="gate-btn reset" id="restartAdventure" type="button">再次冒險</button>
      </div>
    </section>
  </div>

  <div class="ending" id="ending" aria-label="結局過場劇情">
    <section class="ending-scene" data-scene="0">
      <img class="ending-image" src="1.png" alt="三枚憑證歸位">
      <div class="scene-art">
        <div class="road r1"></div>
        <div class="road r2"></div>
        <div class="road r3"></div>
        <div class="gate-arc"></div>
        <div class="gate-core"></div>
        <div class="seal-orb s1">🎴</div>
        <div class="seal-orb s2">📝</div>
        <div class="seal-orb s3">⚔️</div>
      </div>
    </section>
    <section class="ending-scene" data-scene="1">
      <img class="ending-image" src="2.png" alt="大門打開">
      <div class="scene-art">
        <div class="gate-arc"></div>
        <div class="star-door"></div>
        <div class="wizard">🧙</div>
      </div>
    </section>
    <section class="ending-scene" data-scene="2">
      <img class="ending-image" src="3.png" alt="知識群島">
      <div class="scene-art">
        <div class="island i1" data-icon="🎴"></div>
        <div class="island i2" data-icon="📝"></div>
        <div class="island i3" data-icon="⚔️"></div>
        <div class="bridge b1"></div>
        <div class="bridge b2"></div>
      </div>
    </section>
    <section class="ending-scene" data-scene="3">
      <img class="ending-image" src="4.png" alt="新的地圖">
      <div class="scene-art">
        <div class="star-map"></div>
        <div class="wizard">🧙</div>
      </div>
    </section>
    <div class="ending-caption" id="endingCaption">
      <h2 id="endingTitle">三印啟門</h2>
      <p id="endingText"></p>
      <div class="ending-hint">點擊任意處繼續</div>
    </div>
  </div>

  <script>
    const LEVELS = [
      { id: "dynasty", key: "cert_dynasty", icon: "🎴", href: "../示範1_朝代配對/index.html", cert: "朝代之印", label: "朝代" },
      { id: "idiom", key: "cert_idiom", icon: "📝", href: "../示範2_成語填字/index.html", cert: "成語之印", label: "成語" },
      { id: "warrior", key: "cert_warrior", icon: "⚔️", href: "../示範3_打怪RPG/index.html", cert: "勇者之印", label: "勇者" }
    ];

    const cover = document.querySelector("#cover");
    const certCountEl = document.querySelector("#certCount");
    const modal = document.querySelector("#modal");
    const slotsEl = document.querySelector("#slots");
    const certBag = document.querySelector("#certBag");
    const doorBody = document.querySelector("#doorBody");
    const win = document.querySelector("#win");
    const duration = document.querySelector("#duration");
    const ending = document.querySelector("#ending");
    const endingTitle = document.querySelector("#endingTitle");
    const endingText = document.querySelector("#endingText");
    const endingScenes = [...document.querySelectorAll(".ending-scene")];
    let placed = {};
    let activeCert = null;
    let endingIndex = 0;
    let endingTimer = null;
    const ENDING_STORY = [
      { title: "三枚憑證歸位", text: "三段旅程沒有消失，它們只是安靜地回到門上。" },
      { title: "大門打開", text: "真正被打開的，從來不只是門。" },
      { title: "知識群島", text: "答對的題，成了路。答錯的題，也成了路旁的燈。" },
      { title: "新的地圖", text: "那就把下一個未知，也標在地圖上吧。" }
    ];

    function initCover() {
      if (sessionStorage.getItem("cover_seen") === "true") {
        ensureStartTime();
        cover.classList.add("hide");
        return;
      }
      cover.addEventListener("click", hideCover, { once: true });
    }

    function hideCover() {
      sessionStorage.setItem("cover_seen", "true");
      ensureStartTime();
      cover.classList.add("hide");
    }

    function ensureStartTime() {
      if (!localStorage.getItem("adventure_start")) {
        localStorage.setItem("adventure_start", String(Date.now()));
      }
    }

    function hasCert(level) {
      return localStorage.getItem(level.key) === "true";
    }

    function renderMap() {
      const count = LEVELS.filter(hasCert).length;
      certCountEl.textContent = count;
      LEVELS.forEach(level => {
        const stamp = document.querySelector(`[data-stamp="${level.id}"]`);
        if (stamp) stamp.hidden = !hasCert(level);
      });
    }

    function openGate() {
      ensureStartTime();
      placed = {};
      doorBody.classList.remove("hide");
      win.classList.remove("show");
      renderDoor();
      modal.classList.add("show");
    }

    function renderDoor() {
      slotsEl.innerHTML = "";
      certBag.innerHTML = "";
      LEVELS.forEach(level => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.dataset.slot = level.id;
        slot.textContent = `${level.label} 凹槽`;
        setupSlot(slot);
        slotsEl.appendChild(slot);
      });

      const owned = LEVELS.filter(hasCert);
      if (owned.length === 0) {
        certBag.innerHTML = `<div class="empty">尚未取得憑證，仍可先看看大門。</div>`;
        return;
      }
      owned.forEach(level => certBag.appendChild(createCert(level)));
    }

    function createCert(level) {
      const cert = document.createElement("div");
      cert.className = "cert";
      cert.draggable = true;
      cert.dataset.cert = level.id;
      cert.innerHTML = `<span>${level.icon}</span><span>${level.cert}</span>`;
      cert.addEventListener("dragstart", event => {
        event.dataTransfer.setData("text/plain", level.id);
        event.dataTransfer.effectAllowed = "move";
      });
      cert.addEventListener("pointerdown", event => startPointerDrag(event, cert));
      return cert;
    }

    function setupSlot(slot) {
      slot.addEventListener("dragover", event => {
        event.preventDefault();
        slot.classList.add("over");
      });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", event => {
        event.preventDefault();
        slot.classList.remove("over");
        const certId = event.dataTransfer.getData("text/plain");
        const cert = document.querySelector(`.cert[data-cert="${certId}"]`);
        placeCert(cert, slot);
      });
    }

    function placeCert(cert, slot) {
      if (!cert || cert.classList.contains("placed")) return;
      if (cert.dataset.cert !== slot.dataset.slot) {
        slot.classList.remove("wrong");
        slot.offsetWidth;
        slot.classList.add("wrong");
        setTimeout(() => slot.classList.remove("wrong"), 300);
        return;
      }
      placed[slot.dataset.slot] = true;
      slot.classList.add("correct");
      slot.innerHTML = "";
      cert.classList.add("placed");
      cert.draggable = false;
      slot.appendChild(cert);
      if (Object.keys(placed).length === 3) completeAdventure();
    }

    function completeAdventure() {
      const started = Number(localStorage.getItem("adventure_start")) || Date.now();
      const seconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
      const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
      const secs = String(seconds % 60).padStart(2, "0");
      duration.textContent = `${mins} 分 ${secs} 秒`;
      startEndingCutscene();
    }

    function startEndingCutscene() {
      endingIndex = 0;
      doorBody.classList.add("hide");
      win.classList.remove("show");
      ending.classList.add("show");
      renderEndingScene();
    }

    function renderEndingScene() {
      clearTimeout(endingTimer);
      const scene = ENDING_STORY[endingIndex];
      endingScenes.forEach((panel, index) => {
        panel.classList.toggle("active", index === endingIndex);
      });
      endingTitle.textContent = endingIndex === 0 ? `三印啟門｜${scene.title}` : scene.title;
      endingText.textContent = scene.text;
      restartCaptionAnimation();
      endingTimer = setTimeout(advanceEnding, 4800);
    }

    function restartCaptionAnimation() {
      const caption = document.querySelector("#endingCaption");
      caption.classList.remove("playing");
      caption.offsetWidth;
      caption.classList.add("playing");
    }

    function advanceEnding() {
      if (!ending.classList.contains("show")) return;
      clearTimeout(endingTimer);
      endingIndex += 1;
      if (endingIndex >= ENDING_STORY.length) {
        ending.classList.remove("show");
        showAdventureComplete();
        return;
      }
      renderEndingScene();
    }

    function showAdventureComplete() {
      clearTimeout(endingTimer);
      doorBody.classList.add("hide");
      win.classList.add("show");
    }

    function startPointerDrag(event, cert) {
      if (cert.classList.contains("placed")) return;
      event.preventDefault();
      activeCert = { cert, home: cert.parentElement, next: cert.nextSibling };
      const rect = cert.getBoundingClientRect();
      cert.style.left = `${rect.left + rect.width / 2}px`;
      cert.style.top = `${rect.top + rect.height / 2}px`;
      cert.classList.add("dragging");
      document.body.appendChild(cert);
      movePointerDrag(event);
      window.addEventListener("pointermove", movePointerDrag);
      window.addEventListener("pointerup", endPointerDrag, { once: true });
    }

    function movePointerDrag(event) {
      if (!activeCert) return;
      activeCert.cert.style.left = `${event.clientX}px`;
      activeCert.cert.style.top = `${event.clientY}px`;
      document.querySelectorAll(".slot").forEach(slot => slot.classList.remove("over"));
      const target = document.elementFromPoint(event.clientX, event.clientY);
      const slot = target && target.closest(".slot");
      if (slot && !slot.classList.contains("correct")) slot.classList.add("over");
    }

    function endPointerDrag(event) {
      if (!activeCert) return;
      const { cert, home, next } = activeCert;
      document.querySelectorAll(".slot").forEach(slot => slot.classList.remove("over"));
      cert.classList.remove("dragging");
      cert.style.left = "";
      cert.style.top = "";
      if (next && next.parentElement === home) home.insertBefore(cert, next);
      else home.appendChild(cert);
      const target = document.elementFromPoint(event.clientX, event.clientY);
      const slot = target && target.closest(".slot");
      if (slot) placeCert(cert, slot);
      activeCert = null;
      window.removeEventListener("pointermove", movePointerDrag);
    }

    function clearAdventure() {
      clearTimeout(endingTimer);
      localStorage.clear();
      sessionStorage.clear();
      renderMap();
      modal.classList.remove("show");
      cover.classList.remove("hide");
      cover.addEventListener("click", hideCover, { once: true });
    }

    document.querySelector("#openGate").addEventListener("click", openGate);
    document.querySelector("#closeModal").addEventListener("click", () => modal.classList.remove("show"));
    document.querySelector("#clearProgress").addEventListener("click", clearAdventure);
    document.querySelector("#restartAdventure").addEventListener("click", clearAdventure);
    document.querySelectorAll(".hotspot[href]").forEach(link => {
      link.addEventListener("click", ensureStartTime);
    });
    ending.addEventListener("click", advanceEnding);
    modal.addEventListener("click", event => {
      if (event.target === modal) modal.classList.remove("show");
    });

    initCover();
    renderMap();
  </script>
</body>
</html>
