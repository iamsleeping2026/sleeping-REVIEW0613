<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>朝代配對練習</title>
  <style>
    :root {
      --bg: #140f0b;
      --panel: #21170f;
      --panel-dark: #18100b;
      --gold: #d7ad55;
      --gold-light: #f6d98a;
      --paper: #f2e1bd;
      --red: #9d2f24;
      --red-light: #d34a38;
      --green: #4f9d5d;
      --text: #fff7e8;
      --ink: #25180d;
      --muted: #c9b48a;
      --line: rgba(215, 173, 85, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif TC", "PMingLiU", "MingLiU", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(211, 74, 56, 0.2), transparent 28rem),
        radial-gradient(circle at 90% 20%, rgba(215, 173, 85, 0.16), transparent 26rem),
        linear-gradient(135deg, #0d0907 0%, #1b120c 55%, #120c09 100%);
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(215, 173, 85, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(215, 173, 85, 0.04) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
    }

    .map-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      padding: 9px 13px;
      border: 1px solid rgba(215, 173, 85, 0.5);
      border-radius: 8px;
      color: var(--gold-light);
      background: rgba(24, 16, 11, 0.88);
      text-decoration: none;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(0,0,0,0.24);
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(33, 23, 15, 0.86);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    h1 {
      margin: 0;
      color: var(--gold-light);
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.08em;
      text-shadow: 0 0 18px rgba(215, 173, 85, 0.28);
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .stat {
      min-width: 110px;
      padding: 10px 14px;
      border: 1px solid rgba(215, 173, 85, 0.42);
      border-radius: 8px;
      color: var(--gold-light);
      background: rgba(215, 173, 85, 0.09);
      text-align: center;
      font-weight: 700;
    }

    .board {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 16, 11, 0.86);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(157, 47, 36, 0.35), rgba(215, 173, 85, 0.12));
    }

    .panel-title h2 {
      margin: 0;
      color: var(--gold-light);
      font-size: 1.2rem;
      letter-spacing: 0.08em;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .dynasty-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 16px;
    }

    .dynasty-card {
      min-height: 206px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0)),
        var(--paper);
      box-shadow:
        inset 0 0 0 1px rgba(80, 47, 19, 0.24),
        0 12px 24px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .dynasty-name {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      border-bottom: 1px solid rgba(80, 47, 19, 0.22);
      color: #5c260e;
      background: rgba(215, 173, 85, 0.22);
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: 0.16em;
    }

    .dropzone {
      min-height: 138px;
      display: flex;
      align-content: start;
      align-items: start;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .dropzone::before {
      content: "拖曳事件至此";
      width: 100%;
      color: rgba(37, 24, 13, 0.42);
      font-size: 0.9rem;
      text-align: center;
    }

    .dropzone.has-match::before {
      content: "";
      display: none;
    }

    .dropzone.drag-over {
      background: rgba(215, 173, 85, 0.24);
      box-shadow: inset 0 0 18px rgba(157, 47, 36, 0.22);
    }

    .event-pool {
      display: grid;
      gap: 10px;
      max-height: 672px;
      padding: 16px;
      overflow: auto;
    }

    .event-card {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 11px 13px;
      border: 1px solid var(--red-light);
      border-radius: 8px;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(157, 47, 36, 0.3), rgba(24, 16, 11, 0.9)),
        var(--panel-dark);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.24);
      cursor: grab;
      user-select: none;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .event-card:hover {
      transform: translateY(-2px);
      border-color: var(--gold-light);
      box-shadow: 0 0 18px rgba(215, 173, 85, 0.22);
    }

    .event-card:active {
      cursor: grabbing;
    }

    .event-card.wrong {
      animation: wrongFlash 0.3s ease;
    }

    @keyframes wrongFlash {
      0%, 100% {
        transform: translateX(0);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.24);
      }
      25% {
        transform: translateX(-7px);
        box-shadow: 0 0 20px rgba(255, 70, 55, 0.75);
      }
      50% {
        transform: translateX(7px);
        background: rgba(157, 47, 36, 0.72);
      }
      75% {
        transform: translateX(-4px);
      }
    }

    .icon {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 8px;
      background: rgba(215, 173, 85, 0.16);
      font-size: 1.25rem;
      flex: 0 0 auto;
    }

    .event-text {
      font-size: 1rem;
      font-weight: 700;
    }

    .mini-card {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      padding: 7px 9px;
      border: 1px solid rgba(79, 157, 93, 0.7);
      border-radius: 8px;
      color: #103517;
      background: rgba(79, 157, 93, 0.22);
      font-size: 0.86rem;
      font-weight: 800;
      box-shadow: 0 0 14px rgba(79, 157, 93, 0.2);
      animation: lockIn 0.2s ease;
    }

    .mini-card span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @keyframes lockIn {
      from {
        transform: scale(0.84);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .complete {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(11, 7, 4, 0.72);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .complete.show {
      display: grid;
    }

    .complete-card {
      width: min(92vw, 430px);
      padding: 30px;
      border: 2px solid var(--gold-light);
      border-radius: 8px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(246, 217, 138, 0.28), transparent 14rem),
        linear-gradient(160deg, #3a2411, #130d08);
      box-shadow:
        0 0 34px rgba(246, 217, 138, 0.48),
        0 22px 70px rgba(0, 0, 0, 0.62);
      text-align: center;
      animation: goldBurst 0.8s ease both;
    }

    @keyframes goldBurst {
      0% {
        transform: scale(0.86);
        filter: brightness(2);
        opacity: 0;
      }
      60% {
        transform: scale(1.04);
        filter: brightness(1.45);
      }
      100% {
        transform: scale(1);
        filter: brightness(1);
        opacity: 1;
      }
    }

    .complete-card h2 {
      margin: 0 0 8px;
      color: var(--gold-light);
      font-size: 2rem;
      letter-spacing: 0.1em;
    }

    .complete-card p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    button {
      min-height: 48px;
      padding: 0 22px;
      border: 1px solid var(--gold-light);
      border-radius: 8px;
      color: #2b1608;
      background: linear-gradient(180deg, var(--gold-light), var(--gold));
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 26px rgba(215, 173, 85, 0.22);
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 680px);
        padding-top: 14px;
      }

      header,
      .board {
        display: block;
      }

      .stats {
        justify-content: start;
        margin-top: 14px;
      }

      .board {
        display: grid;
        grid-template-columns: 1fr;
      }

      .dynasty-grid {
        grid-template-columns: 1fr;
      }

      .dynasty-card {
        min-height: 176px;
      }

      .dropzone {
        min-height: 104px;
      }

      .event-pool {
        display: flex;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
      }

      .event-card {
        min-width: 220px;
        scroll-snap-align: start;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html" onclick="sessionStorage.setItem('cover_seen','true')">← 回到大地圖</a>
  <div class="app">
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">把右欄事件拖曳到正確朝代；正確會鎖定，錯誤會彈回。</p>
      </div>
      <div class="stats">
        <div class="stat">嘗試 <span id="attempts">0</span></div>
        <div class="stat">完成 <span id="matched">0</span>/<span id="total">0</span></div>
      </div>
    </header>

    <main class="board">
      <section class="panel">
        <div class="panel-title">
          <h2>朝代</h2>
          <span>可放多張事件卡</span>
        </div>
        <div class="dynasty-grid" id="dynastyGrid"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>事件</h2>
          <span>拖曳配對</span>
        </div>
        <div class="event-pool" id="eventPool"></div>
      </section>
    </main>
  </div>

  <div class="complete" id="complete">
    <div class="complete-card">
      <h2>過關成功</h2>
      <p>總嘗試次數：<strong id="finalAttempts">0</strong></p>
      <button type="button" id="playAgain">再玩一次</button>
    </div>
  </div>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
      { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
      { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
      { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastyGrid = document.querySelector("#dynastyGrid");
    const eventPool = document.querySelector("#eventPool");
    const attemptsText = document.querySelector("#attempts");
    const matchedText = document.querySelector("#matched");
    const totalText = document.querySelector("#total");
    const complete = document.querySelector("#complete");
    const finalAttempts = document.querySelector("#finalAttempts");
    const playAgain = document.querySelector("#playAgain");

    let shuffledEvents = [];
    let matchedIds = new Set();
    let attempts = 0;

    function shuffle(items) {
      const copied = [...items];
      for (let i = copied.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function startGame() {
      shuffledEvents = shuffle(events);
      matchedIds = new Set();
      attempts = 0;
      complete.classList.remove("show");
      totalText.textContent = events.length;
      updateStats();
      renderDynasties();
      renderEventPool();
    }

    function renderDynasties() {
      dynastyGrid.innerHTML = "";
      dynasties.forEach(dynasty => {
        const card = document.createElement("article");
        card.className = "dynasty-card";
        card.innerHTML = `
          <div class="dynasty-name">${dynasty.name}</div>
          <div class="dropzone" data-dynasty-id="${dynasty.id}"></div>
        `;
        dynastyGrid.appendChild(card);
      });

      document.querySelectorAll(".dropzone").forEach(zone => {
        zone.addEventListener("dragover", event => {
          event.preventDefault();
          zone.classList.add("drag-over");
        });

        zone.addEventListener("dragleave", () => {
          zone.classList.remove("drag-over");
        });

        zone.addEventListener("drop", event => {
          event.preventDefault();
          zone.classList.remove("drag-over");
          handleDrop(event, zone);
        });
      });
    }

    function renderEventPool() {
      eventPool.innerHTML = "";
      shuffledEvents
        .filter(item => !matchedIds.has(item.id))
        .forEach(item => {
          const card = document.createElement("div");
          card.className = "event-card";
          card.draggable = true;
          card.dataset.eventId = item.id;
          card.innerHTML = `
            <span class="icon">${item.icon}</span>
            <span class="event-text">${item.text}</span>
          `;
          card.addEventListener("dragstart", event => {
            event.dataTransfer.setData("text/plain", item.id);
            event.dataTransfer.effectAllowed = "move";
          });
          eventPool.appendChild(card);
        });
    }

    function handleDrop(event, zone) {
      const eventId = event.dataTransfer.getData("text/plain");
      const item = events.find(entry => entry.id === eventId);
      const dynastyId = Number(zone.dataset.dynastyId);
      if (!item || matchedIds.has(item.id)) return;

      attempts += 1;

      if (item.dynasty_id === dynastyId) {
        matchedIds.add(item.id);
        addMiniCard(zone, item);
        renderEventPool();
      } else {
        flashWrongCard(item.id);
      }

      updateStats();
      checkComplete();
    }

    function addMiniCard(zone, item) {
      zone.classList.add("has-match");
      const mini = document.createElement("div");
      mini.className = "mini-card";
      mini.innerHTML = `<span>${item.icon}</span><span>${item.text}</span>`;
      zone.appendChild(mini);
    }

    function flashWrongCard(eventId) {
      const card = eventPool.querySelector(`[data-event-id="${eventId}"]`);
      if (!card) return;
      card.classList.remove("wrong");
      card.offsetWidth;
      card.classList.add("wrong");
      setTimeout(() => card.classList.remove("wrong"), 300);
    }

    function updateStats() {
      attemptsText.textContent = attempts;
      matchedText.textContent = matchedIds.size;
    }

    function checkComplete() {
      if (matchedIds.size !== events.length) return;
      localStorage.setItem("cert_dynasty", "true");
      finalAttempts.textContent = attempts;
      setTimeout(() => {
        complete.classList.add("show");
        playAgain.focus();
      }, 260);
    }

    playAgain.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
